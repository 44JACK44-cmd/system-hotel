<div class="hs-slide-panel">
  <div class="hs-slide-panel__header">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="material-symbols-outlined">payments</span>
      <span style="font-weight:700;font-size:16px">REGISTRAR PAGO</span>
    </div>
    <button class="hs-topbar__icon-btn" (click)="cerrar()">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  <p-toast position="top-center" />

  <div class="hs-slide-panel__body">
    <div class="hs-field">
      <label class="hs-label">TIPO DE PAGO</label>
      <p-select [(ngModel)]="tipo" [options]="tipos" optionLabel="label" optionValue="value" placeholder="Seleccionar tipo" styleClass="w-full" appendTo="body" />
    </div>

    <div class="hs-field">
      <label class="hs-label">MONTO</label>
      <p-inputNumber [(ngModel)]="monto" [minFractionDigits]="2" [maxFractionDigits]="2" [min]="0.01" placeholder="S/ 0.00" inputStyleClass="hs-input" styleClass="w-full" />
    </div>

    <div class="hs-field">
      <label class="hs-label">MÉTODO</label>
      <div style="display:flex;gap:12px;align-items:center;padding-top:4px">
        <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer">
          <input type="radio" name="metodo" [(ngModel)]="metodo" value="YAPE" /> YAPE
        </label>
        <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer">
          <input type="radio" name="metodo" [(ngModel)]="metodo" value="EFECTIVO" /> EFECTIVO
        </label>
      </div>
    </div>

    <div class="hs-field">
      <label class="hs-label">REFERENCIA</label>
      <input class="hs-input" type="text" [(ngModel)]="referencia" placeholder="Referencia (opcional)" />
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="hs-field">
        <label class="hs-label">RESERVA ID</label>
        <input class="hs-input" type="number" [(ngModel)]="reservaId" placeholder="Opcional" />
      </div>
      <div class="hs-field">
        <label class="hs-label">HOSPEDAJE ID</label>
        <input class="hs-input" type="number" [(ngModel)]="hospedajeId" placeholder="Opcional" />
      </div>
    </div>
  </div>

  <div class="hs-slide-panel__footer">
    <button class="hs-btn hs-btn-outline" style="flex:1" (click)="cerrar()">
      Cancelar
    </button>
    <button class="hs-btn hs-btn-primary" style="flex:1"
      [disabled]="!puedeGuardar() || loading" (click)="guardar()">
      @if (loading) {
        <span class="material-symbols-outlined" style="animation:spin 1s linear infinite">sync</span>
      }
      REGISTRAR PAGO
    </button>
  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>
