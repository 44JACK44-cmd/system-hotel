<p-toast position="top-center" />
<aside class="hs-sidebar hs-sidebar-wrapper">
  <div class="hs-sidebar__header">
    <span class="material-symbols-outlined hs-sidebar__hotel-icon" style="font-size:32px">hotel</span>
    <div>
      <div class="hs-sidebar__branch">Abancay</div>
      <div class="hs-sidebar__role">{{ rolLabel }}</div>
    </div>
  </div>

  <div class="hs-sidebar__body">
    <div class="hs-sidebar__section-label">OPERACIONES PRINCIPALES</div>

    <nav class="hs-sidebar__nav hs-scroll" role="navigation" aria-label="Navegación principal">
      @for (item of filteredMenu; track item.route) {
        <a [routerLink]="item.route"
           class="hs-sidebar__nav-item"
           [class.sidebar-nav-active]="isActive(item.route)"
           (click)="handleNavClick(item.route)">
          <span class="material-symbols-outlined">{{ item.icon }}</span>
          <span class="hs-sidebar__nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="hs-sidebar__section-label">ACCIONES</div>

    <div class="hs-sidebar__quick">
      <button class="hs-sidebar__quick-btn" (click)="goTo(quickCheckInRoute)">
        <span class="material-symbols-outlined">add_circle</span>
        Check-In R&aacute;pido
      </button>
    </div>
  </div>

  <div class="hs-sidebar__footer">
    <a class="hs-sidebar__nav-item hs-sidebar__nav-item--sm" (click)="centroAyuda()" style="cursor:pointer">
      <span class="material-symbols-outlined">help</span>
      <span class="hs-sidebar__nav-label">Centro de Ayuda</span>
    </a>
    <a class="hs-sidebar__nav-item hs-sidebar__nav-item--sm hs-sidebar__nav-item--danger"
       (click)="logout()" style="cursor:pointer">
      <span class="material-symbols-outlined">logout</span>
      <span class="hs-sidebar__nav-label">Cerrar Sesi&oacute;n</span>
    </a>
  </div>
</aside>
