<div class="hs-slide-panel" style="max-width:560px">
  <div class="hs-slide-panel__header">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="material-symbols-outlined">calendar_add_on</span>
      <span style="font-weight:700;font-size:16px">NUEVA RESERVA</span>
    </div>
    <button class="hs-topbar__icon-btn" (click)="cerrar()">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  <p-toast position="top-center" />

  <div class="hs-slide-panel__body">
    <div class="nr-grid">
      <!-- LEFT COLUMN -->
      <div class="nr-col">
        <div class="hs-field">
          <label class="hs-label">CLIENTE</label>
          <div class="nr-search-row">
            <input class="hs-input" type="text" [(ngModel)]="searchTerm" placeholder="Buscar cliente..." (keyup.enter)="buscarCliente()" />
            <button class="hs-btn hs-btn-secondary nr-search-btn" (click)="buscarCliente()">
              <span class="material-symbols-outlined">search</span>
            </button>
          </div>
          @if (clientes.length > 0) {
            <select class="hs-input nr-mb-1" [(ngModel)]="selectedCliente">
              <option [ngValue]="null" disabled>Seleccionar cliente</option>
              @for (c of clientes; track c) {
                <option [ngValue]="c">{{ c.nombreCompleto }}</option>
              }
            </select>
          }
          <div class="nr-divider">
            <span class="nr-divider-text">o crear nuevo</span>
          </div>
          <div class="nr-grid-2">
            <input class="hs-input" type="text" [(ngModel)]="nuevoCliente.nombreCompleto" placeholder="Nombre completo" />
            <input class="hs-input" type="text" [(ngModel)]="nuevoCliente.telefono" placeholder="Teléfono" />
          </div>
          <div class="nr-grid-2" style="margin-top:8px">
            <input class="hs-input" type="text" [(ngModel)]="nuevoCliente.documento" placeholder="Documento (opcional)" />
            <input class="hs-input" type="text" [(ngModel)]="nuevoCliente.email" placeholder="Email (opcional)" />
          </div>
        </div>

        <div class="hs-field">
          <label class="hs-label">HABITACIÓN</label>
          <div class="nr-select-wrapper">
            <select class="hs-input" [(ngModel)]="reservaData.habitacionId" (ngModelChange)="recalcular();onHabitacionChange()">
              <option [ngValue]="null" disabled>Seleccionar habitación</option>
              @for (h of habitaciones; track h) {
                <option [ngValue]="h.value || h.id">{{ h.label }}</option>
              }
            </select>
            <span class="material-symbols-outlined nr-select-arrow">keyboard_arrow_down</span>
          </div>
        </div>
      </div>

      <!-- RIGHT COLUMN -->
      <div class="nr-col">
        <div class="hs-field">
          <div class="nr-fechas-header">
            <label class="hs-label">FECHAS</label>
            <div class="nr-saldo">
              <span class="nr-saldo-label">SALDO:</span>
              <span class="nr-saldo-value">S/ {{ saldoPendiente.toFixed(2) }}</span>
            </div>
          </div>
          <div class="nr-fechas-row">
            <div class="nr-date-wrapper">
              <input class="hs-input nr-date-input" type="date" [(ngModel)]="reservaData.fechaEntrada" (ngModelChange)="recalcular()" />
              <span class="material-symbols-outlined nr-date-icon">calendar_month</span>
            </div>
            <span class="nr-date-sep">-</span>
            <div class="nr-date-wrapper">
              <input class="hs-input nr-date-input" type="date" [(ngModel)]="reservaData.fechaSalida" (ngModelChange)="recalcular()" />
              <span class="material-symbols-outlined nr-date-icon">calendar_month</span>
            </div>
          </div>
          @if (noches > 0) {
            <div class="nr-noches-box">
              <span class="nr-noches-text">{{ noches }} noche(s) x S/{{ precioNoche }} = </span>
              <span class="nr-noches-total">S/ {{ montoTotalDisplay }}</span>
            </div>
          }
        </div>

        <div class="hs-field">
          <label class="hs-label">ADELANTO <span class="nr-obligatorio">(obligatorio)</span></label>
          <div class="nr-adelanto-row">
            <div class="nr-monto-wrapper">
              <span class="nr-monto-prefix">S/</span>
              <input class="hs-input nr-monto-input" type="number" [(ngModel)]="reservaData.adelanto" (ngModelChange)="recalcular()" placeholder="0.00" min="0" step="0.01" />
            </div>
            <div class="nr-pago-opts">
              <label class="nr-radio">
                <input type="radio" name="metodo" [(ngModel)]="reservaData.metodoPago" value="YAPE" />
                <span class="nr-radio-dot"></span>
                YAPE
              </label>
              <label class="nr-radio">
                <input type="radio" name="metodo" [(ngModel)]="reservaData.metodoPago" value="EFECTIVO" />
                <span class="nr-radio-dot"></span>
                EFECTIVO
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="hs-field">
      <textarea class="hs-input" [(ngModel)]="reservaData.observaciones" rows="2" placeholder="Observaciones"></textarea>
    </div>
  </div>

  <div class="hs-slide-panel__footer">
    <button class="hs-btn hs-btn-outline" style="flex:1" (click)="cerrar()">
      Cancelar
    </button>
    <button class="hs-btn hs-btn-primary" style="flex:1"
      [disabled]="!puedeGuardar() || loading" (click)="guardar()">
      @if (loading) {
        <span class="material-symbols-outlined nr-spin">sync</span>
      }
      GUARDAR
    </button>
  </div>
</div>

<style>
@keyframes nr-spin { to { transform: rotate(360deg); } }
.nr-spin { animation: nr-spin 1s linear infinite; }
</style>
