<div style="position:fixed;top:0;right:0;width:400px;height:100%;background:white;box-shadow:-4px 0 24px rgba(0,0,0,0.12);z-index:50;overflow-y:auto;display:flex;flex-direction:column">
  <div style="background:linear-gradient(135deg,#1a365d,#1e40af);color:white;padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
    <div style="display:flex;align-items:center;gap:0.5rem">
      <i class="pi pi-calendar-plus" style="font-size:1.1rem"></i>
      <span style="font-weight:700;font-size:0.95rem">NUEVA RESERVA</span>
    </div>
    <i class="pi pi-times" style="cursor:pointer;font-size:1rem;opacity:0.7" (click)="cerrar()"></i>
  </div>
  <p-toast position="top-center"></p-toast>
  <div style="padding:1.25rem;display:flex;flex-direction:column;gap:1rem;flex:1">
    <div>
      <label style="font-size:0.7rem;color:#64748b;font-weight:600;display:block;margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.5px">CLIENTE</label>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem">
        <input pInputText [(ngModel)]="searchTerm" placeholder="Buscar cliente..." style="flex:1;padding:0.5rem 0.75rem;border-radius:8px;font-size:0.8rem" (keyup.enter)="buscarCliente()" />
        <button pButton icon="pi pi-search" (click)="buscarCliente()" styleClass="p-button-sm" [style]="{'border-radius':'8px'}"></button>
      </div>
      @if (clientes.length > 0) {
        <div style="margin-bottom:0.5rem">
          <p-select [(ngModel)]="selectedCliente" [options]="clientes" optionLabel="nombreCompleto" placeholder="Seleccionar cliente" styleClass="w-full" [style]="{'border-radius':'8px'}"></p-select>
        </div>
      }
      <div style="font-size:0.65rem;color:#94a3b8;margin:0.5rem 0;text-align:center;position:relative">
        <span style="background:white;padding:0 0.5rem;position:relative;z-index:1">o crear nuevo</span>
        <div style="position:absolute;top:50%;left:0;right:0;border-top:1px solid #e2e8f0;z-index:0"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem">
        <input pInputText [(ngModel)]="nuevoCliente.nombreCompleto" placeholder="Nombre completo" style="padding:0.5rem 0.75rem;border-radius:8px;font-size:0.8rem" />
        <input pInputText [(ngModel)]="nuevoCliente.telefono" placeholder="Teléfono" style="padding:0.5rem 0.75rem;border-radius:8px;font-size:0.8rem" />
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:0.5rem">
        <input pInputText [(ngModel)]="nuevoCliente.documento" placeholder="Documento (opcional)" style="padding:0.5rem 0.75rem;border-radius:8px;font-size:0.8rem" />
        <input pInputText [(ngModel)]="nuevoCliente.email" placeholder="Email (opcional)" style="padding:0.5rem 0.75rem;border-radius:8px;font-size:0.8rem" />
      </div>
    </div>

    <div>
      <label style="font-size:0.7rem;color:#64748b;font-weight:600;display:block;margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.5px">HABITACI&Oacute;N</label>
      <p-select [(ngModel)]="reservaData.habitacionId" (onChange)="onHabitacionChange()" (ngModelChange)="recalcular()" [options]="habitaciones" optionLabel="label" placeholder="Seleccionar habitación" styleClass="w-full" [style]="{'border-radius':'8px'}"></p-select>
    </div>

    <div>
      <label style="font-size:0.7rem;color:#64748b;font-weight:600;display:block;margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.5px">FECHAS</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.5rem">
        <div>
          <label style="font-size:0.65rem;color:#94a3b8;display:block;margin-bottom:0.2rem">Entrada</label>
          <input type="date" [(ngModel)]="reservaData.fechaEntrada" (ngModelChange)="recalcular()" (change)="recalcular()" (input)="recalcular()" style="width:100%;padding:0.5rem 0.75rem;border-radius:8px;border:1px solid #d1d5db;font-size:0.8rem;box-sizing:border-box" />
        </div>
        <div>
          <label style="font-size:0.65rem;color:#94a3b8;display:block;margin-bottom:0.2rem">Salida</label>
          <input type="date" [(ngModel)]="reservaData.fechaSalida" (ngModelChange)="recalcular()" (change)="recalcular()" (input)="recalcular()" style="width:100%;padding:0.5rem 0.75rem;border-radius:8px;border:1px solid #d1d5db;font-size:0.8rem;box-sizing:border-box" />
        </div>
      </div>
      @if (noches > 0) {
        <div style="background:#f8fafc;border-radius:8px;padding:0.5rem 0.75rem;font-size:0.8rem;text-align:right">
          <span style="color:#64748b">{{ noches }} noche(s) x S/{{ precioNoche }} = </span>
          <span style="font-weight:700;color:#1a365d">S/ {{ montoTotalDisplay }}</span>
        </div>
      }
    </div>

    <div>
      <label style="font-size:0.7rem;color:#64748b;font-weight:600;display:block;margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.5px">ADELANTO</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem">
        <div>
          <label style="font-size:0.65rem;color:#94a3b8;display:block;margin-bottom:0.2rem">Monto</label>
          <p-inputNumber [(ngModel)]="reservaData.adelanto" (ngModelChange)="recalcular()" placeholder="S/ 40.00" styleClass="w-full" inputStyleClass="w-full" [min]="0" [style]="{'border-radius':'8px'}"></p-inputNumber>
        </div>
        <div>
          <label style="font-size:0.65rem;color:#94a3b8;display:block;margin-bottom:0.2rem">M&eacute;todo</label>
          <div style="display:flex;gap:0.75rem;align-items:center;height:100%;padding-top:0.25rem">
            <div style="display:flex;align-items:center;gap:0.3rem">
              <p-radioButton name="metodo" [(ngModel)]="reservaData.metodoPago" value="YAPE"></p-radioButton>
              <label style="font-size:0.8rem;color:#475569;cursor:pointer">YAPE</label>
            </div>
            <div style="display:flex;align-items:center;gap:0.3rem">
              <p-radioButton name="metodo" [(ngModel)]="reservaData.metodoPago" value="EFECTIVO"></p-radioButton>
              <label style="font-size:0.8rem;color:#475569;cursor:pointer">EFECTIVO</label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div>
      <label style="font-size:0.7rem;color:#64748b;font-weight:600;display:block;margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.5px">Observaciones</label>
      <textarea pInputTextarea [(ngModel)]="reservaData.observaciones" rows="2" style="width:100%;border-radius:8px;padding:0.5rem;font-size:0.8rem"></textarea>
    </div>

    <div style="display:flex;gap:0.5rem;margin-top:auto;padding-top:0.75rem;border-top:1px solid #f1f5f9">
      <button pButton label="CANCELAR" styleClass="p-button-outlined p-button-secondary p-button-sm" (click)="cerrar()" [style]="{'flex':1,'border-radius':'8px'}"></button>
      <button pButton label="GUARDAR" styleClass="p-button-sm" [disabled]="!puedeGuardar() || loading" [loading]="loading" (click)="guardar()" [style]="{'flex':1,'border-radius':'8px','background':'linear-gradient(135deg,#1a365d,#2563eb)','border':'none'}"></button>
    </div>
  </div>
</div>
