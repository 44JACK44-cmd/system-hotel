<div class="hs-overlay" (click)="cerrar()"></div>
<div class="nr-modal" (click)="$event.stopPropagation()">
    <header class="nr-header">
      <h1 class="nr-header-title">NUEVA RESERVA</h1>
      <button class="nr-header-close" (click)="cerrar()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>

    <p-toast position="top-center" />

    <div class="nr-body">
      <section class="nr-section">
        <label class="nr-label">CLIENTE</label>
        <div class="nr-search-row">
          <div class="nr-search-wrap">
            <input class="nr-input" type="text" [(ngModel)]="searchTerm" name="search" (keyup.enter)="buscarCliente()" placeholder="Buscar cliente" />
            <button class="nr-search-btn" type="button" (click)="buscarCliente()">
              <span class="material-symbols-outlined">search</span>
            </button>
          </div>
        </div>
        @if (clientes.length > 0) {
          <p-select [(ngModel)]="selectedCliente" name="selectedCliente" [options]="clientes" optionLabel="nombreCompleto" placeholder="Seleccionar cliente" styleClass="w-full" appendTo="body" />
        }
        <div class="nr-divider">
          <span class="nr-divider-text">O crear nuevo:</span>
        </div>
        <div class="nr-grid-2">
          <input class="nr-input" type="text" [(ngModel)]="nuevoCliente.nombreCompleto" name="nuevoNombre" placeholder="Nombre" />
          <input class="nr-input" type="text" [(ngModel)]="nuevoCliente.documento" name="nuevoDoc" placeholder="Documento" />
        </div>
      </section>

      <section class="nr-section">
        <label class="nr-label">HABITACI&Oacute;N</label>
        <div class="nr-select-wrap">
          <p-select [(ngModel)]="reservaData.habitacionId" name="habitacionId" [options]="habitaciones" optionLabel="label" optionValue="id" placeholder="Buscar habitación" styleClass="w-full" (ngModelChange)="recalcular();onHabitacionChange()" appendTo="body" />
        </div>
      </section>

      <section class="nr-section">
        <div class="nr-fechas-header">
          <label class="nr-label" style="margin-bottom:0">FECHAS</label>
          <div class="nr-saldo">
            <span class="nr-saldo-label">SALDO:</span>
            <p class="nr-saldo-value">S/ {{ saldoPendiente.toFixed(2) }}</p>
          </div>
        </div>
        <div class="nr-fechas-row">
          <div class="nr-date-wrap">
            <p-datepicker [(ngModel)]="reservaData.fechaEntrada" name="fechaEntrada" (ngModelChange)="recalcular()" dateFormat="yy-mm-dd HH:mm" inputStyleClass="nr-input" styleClass="w-full" placeholder="Fecha entrada" appendTo="body" [showTime]="true" hourFormat="24" />
          </div>
          <span class="nr-date-sep">-</span>
          <div class="nr-date-wrap">
            <p-datepicker [(ngModel)]="reservaData.fechaSalida" name="fechaSalida" (ngModelChange)="recalcular()" dateFormat="yy-mm-dd HH:mm" inputStyleClass="nr-input" styleClass="w-full" placeholder="Fecha salida" appendTo="body" [showTime]="true" hourFormat="24" />
          </div>
        </div>
      </section>

      <section class="nr-section">
        <label class="nr-label">ADELANTO <span class="nr-obligatorio">(obligatorio)</span></label>
        <div class="nr-adelanto-row">
          <div class="nr-monto-wrap">
            <span class="nr-monto-prefix">S/</span>
            <input class="nr-input nr-monto-input" type="text" [(ngModel)]="reservaData.adelanto" name="adelanto" (ngModelChange)="recalcular()" placeholder="0.00" />
          </div>
          <div class="nr-pago-opts">
            <p-radioButton [(ngModel)]="reservaData.metodoPago" name="metodo" value="YAPE" inputId="nr-yape" />
            <label for="nr-yape" class="nr-radio-label">YAPE</label>
            <p-radioButton [(ngModel)]="reservaData.metodoPago" name="metodo" value="EFECTIVO" inputId="nr-efectivo" />
            <label for="nr-efectivo" class="nr-radio-label">EFECTIVO</label>
          </div>
        </div>
      </section>

      <section class="nr-section">
        <textarea class="nr-input nr-textarea" [(ngModel)]="reservaData.observaciones" name="observaciones" rows="2" placeholder="Observaciones"></textarea>
      </section>
    </div>

    <div class="nr-actions">
      <button class="nr-btn nr-btn-cancel" type="button" (click)="cerrar()">CANCELAR</button>
      <button class="nr-btn nr-btn-save" type="button" (click)="guardar()" [disabled]="!puedeGuardar() || loading">
        @if (loading) {
          <span class="material-symbols-outlined" style="animation:nr-spin 1s linear infinite;font-size:18px">sync</span>
        }
        GUARDAR
      </button>
    </div>
</div>
