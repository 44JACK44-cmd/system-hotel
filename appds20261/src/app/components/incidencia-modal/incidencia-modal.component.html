<div class="hs-overlay" (click)="cerrar()"></div>
<div class="hs-slide-panel">
  <div class="hs-slide-panel__header">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="material-symbols-outlined">build</span>
      <span style="font-weight:700;font-size:16px">NUEVA INCIDENCIA</span>
    </div>
    <button class="hs-topbar__icon-btn" (click)="cerrar()">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  <p-toast position="top-center" />

  <div class="hs-slide-panel__body">
    <div class="hs-field">
      <label class="hs-label">HABITACIÓN</label>
      <p-select [(ngModel)]="habitacionId" [options]="habitaciones" optionLabel="label" optionValue="id" placeholder="Seleccionar habitación" styleClass="w-full" appendTo="body" />
    </div>

    <div class="hs-field">
      <label class="hs-label">TIPO</label>
      <p-select [(ngModel)]="tipo" [options]="tipos" optionLabel="label" optionValue="value" placeholder="Seleccionar tipo" styleClass="w-full" appendTo="body" />
    </div>

    <div class="hs-field">
      <label class="hs-label">MOTIVO</label>
      <textarea class="hs-input" pTextarea [(ngModel)]="motivo" rows="3" placeholder="Describa el motivo..."></textarea>
    </div>
  </div>

  <div class="hs-slide-panel__footer">
    <button class="hs-btn hs-btn-outline" style="flex:1" (click)="cerrar()">
      Cancelar
    </button>
    <button class="hs-btn hs-btn-primary" style="flex:1"
      [disabled]="!puedeGuardar() || loading" (click)="guardar()">
      @if (loading) {
        <span class="material-symbols-outlined" style="animation:spin 1s linear infinite">sync</span>
      }
      REGISTRAR
    </button>
  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>
