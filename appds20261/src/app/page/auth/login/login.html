<!-- LOGIN — Hospitality Precision design -->
<div class="login-page">

  <!-- Decorative blurs -->
  <div class="login-page__blur login-page__blur--tl"></div>
  <div class="login-page__blur login-page__blur--br"></div>

  <!-- Toast -->
  <p-toast position="top-center" />

  <!-- Card -->
  <div class="login-card">

    <!-- Card top-bar (hotel identity) -->
    <header class="login-card__topbar">
      <div>
        <div class="login-card__hotel-name">HOTEL SYSTEM</div>
        <div class="login-card__branch">Abancay, Perú</div>
      </div>
      <div class="login-card__datetime">
        <span class="login-card__date">{{ fechaHoraActual() }}</span>
      </div>
    </header>

    <!-- Card body -->
    <main class="login-card__body">

      <!-- Icon + title -->
      <div class="login-card__brand">
        <div class="login-card__icon-wrap">
          <span class="material-symbols-outlined" style="font-size:44px;font-variation-settings:'wght' 200">vpn_key</span>
        </div>
        <h1 class="login-card__title">Acceso al Sistema</h1>
        <p class="login-card__subtitle">Gestión Centralizada Hotelera</p>
      </div>

      <!-- Form -->
      <form class="login-form" (ngSubmit)="onSubmit()" [formGroup]="loginForm" novalidate>

        <!-- Username -->
        <div class="hs-field">
          <label class="hs-label" for="login-username">Usuario</label>
          <div class="hs-input-icon">
            <span class="material-symbols-outlined">person</span>
            <input
              id="login-username"
              class="hs-input"
              type="text"
              formControlName="username"
              placeholder="Ingrese su usuario"
              autocomplete="username"
              [class.hs-input--error]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="hs-field">
          <label class="hs-label" for="login-password">Contraseña</label>
          <div class="hs-input-icon">
            <span class="material-symbols-outlined">lock</span>
            <input
              id="login-password"
              class="hs-input"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="current-password"
              [class.hs-input--error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            />
            <button
              type="button"
              class="login-form__toggle-pw"
              (click)="showPassword = !showPassword"
              [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
              <span class="material-symbols-outlined">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
        </div>

        <!-- Remember -->
        <div class="login-form__options">
          <label class="login-form__remember">
            <input type="checkbox" /> Recordarme
          </label>
          <a href="#" class="login-form__forgot">¿Olvidó su clave?</a>
        </div>

        <!-- Submit -->
        <button
          class="hs-btn hs-btn-secondary hs-btn-lg login-form__submit"
          type="submit"
          [disabled]="loginForm.invalid || loading">
          @if (!loading) {
            <span>INGRESAR</span>
          } @else {
            <span class="login-form__spinner">
              <span class="material-symbols-outlined" style="animation: spin 1s linear infinite">sync</span>
              Verificando...
            </span>
          }
          @if (!loading) {
            <span class="material-symbols-outlined">arrow_forward</span>
          }
        </button>

      </form>

      <!-- Footer -->
      <footer class="login-card__footer">
        <span>© 2026 HOTEL SYSTEM MANAGEMENT</span>
        <div class="login-card__footer-icons">
          <span class="material-symbols-outlined" title="Soporte Técnico">support_agent</span>
          <span class="material-symbols-outlined" title="Red">lan</span>
          <span class="material-symbols-outlined" title="Seguridad">security</span>
        </div>
      </footer>
    </main>
  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }

.login-page {
  min-height: 100vh;
  background: var(--clr-surface);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  position: relative;
  overflow: hidden;
}
.login-page__blur {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  pointer-events: none;
  z-index: 0;
}
.login-page__blur--tl {
  width: 280px; height: 280px;
  background: rgba(213,227,255,0.35);
  top: -80px; right: -80px;
}
.login-page__blur--br {
  width: 360px; height: 360px;
  background: rgba(101,161,254,0.12);
  bottom: -100px; left: -100px;
}

/* Card */
.login-card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: 0 20px 50px -12px rgba(0,0,0,0.18);
  border: 1px solid var(--clr-outline-variant);
}

.login-card__topbar {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  background: var(--clr-primary);
  padding: 16px 24px;
  height: 64px;
}
.login-card__hotel-name {
  font-size: 20px;
  font-weight: 900;
  color: white;
  letter-spacing: -0.02em;
}
.login-card__branch {
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.75);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 2px;
}
.login-card__datetime { text-align: right; }
.login-card__date {
  font-size: 10px;
  color: rgba(255,255,255,0.7);
  font-weight: 500;
}

/* Body */
.login-card__body {
  background: var(--clr-surface-container-lowest);
  padding: 28px 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.login-card__brand { text-align: center; }
.login-card__icon-wrap {
  width: 88px; height: 88px;
  border-radius: 50%;
  background: rgba(101,161,254,0.12);
  border: 1px solid rgba(101,161,254,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  color: var(--clr-secondary);
}
.login-card__title {
  margin: 0 0 4px;
  font-size: 20px;
  font-weight: 700;
  color: var(--clr-primary);
}
.login-card__subtitle {
  margin: 0;
  font-size: 13px;
  color: var(--clr-on-surface-variant);
}

/* Form */
.login-form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.hs-input--error {
  border-color: var(--clr-error) !important;
}
.hs-input-icon { position: relative; }
.hs-input-icon > .material-symbols-outlined:first-child {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--clr-outline);
  font-size: 18px;
  pointer-events: none;
}
.hs-input-icon .hs-input { padding-left: 38px; padding-right: 38px; }
.login-form__toggle-pw {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--clr-outline);
  display: flex;
  align-items: center;
  padding: 4px;
}
.login-form__toggle-pw:hover { color: var(--clr-on-surface); }

.login-form__options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}
.login-form__remember {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--clr-on-surface-variant);
  cursor: pointer;
  user-select: none;
}
.login-form__forgot {
  color: var(--clr-secondary);
  text-decoration: none;
  font-size: 13px;
}
.login-form__forgot:hover { text-decoration: underline; }

.login-form__submit {
  width: 100%;
  justify-content: center;
  padding: 12px;
  font-size: 14px;
  letter-spacing: 0.08em;
  background: var(--clr-secondary);
  border-radius: var(--radius-lg);
}
.login-form__submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.login-form__spinner {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Footer */
.login-card__footer {
  text-align: center;
  font-size: 11px;
  color: var(--clr-outline);
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  border-top: 1px solid var(--clr-surface-container-high);
  padding-top: 16px;
  margin-top: 4px;
}
.login-card__footer-icons {
  display: flex;
  gap: 16px;
  color: var(--clr-outline);
}
.login-card__footer-icons .material-symbols-outlined {
  font-size: 18px;
  cursor: help;
  transition: color 0.15s;
}
.login-card__footer-icons .material-symbols-outlined:hover { color: var(--clr-on-surface-variant); }
</style>
