<div class="login-page">

  <p-toast position="top-center" />

  <div class="login-card">
    <div class="login-card__blob login-card__blob--tl"></div>
    <div class="login-card__blob login-card__blob--br"></div>
    <header class="login-card__topbar">
      <div>
        <div class="login-card__hotel-name">HOTEL SYSTEM</div>
        <div class="login-card__branch">Abancay, Peru</div>
      </div>
      <div class="login-card__datetime">
        <p class="login-card__date">{{ fechaActual() }}</p>
        <p class="login-card__time">{{ horaActual() }}</p>
      </div>
    </header>

    <main class="login-card__body">
      <div class="login-card__brand">
        <div class="login-card__icon-wrap">
          <span class="material-symbols-outlined" style="font-size:44px;font-variation-settings:'wght' 200">vpn_key</span>
        </div>
        <h1 class="login-card__title">Acceso al Sistema</h1>
        <p class="login-card__subtitle">Gestión Centralizada Hotelera</p>
      </div>

      <form class="login-form" (ngSubmit)="onSubmit()" [formGroup]="loginForm" novalidate>
        <div class="hs-field">
          <label class="hs-label" for="login-username">USUARIO</label>
          <div class="hs-input-icon">
            <span class="material-symbols-outlined">person</span>
            <input
              id="login-username"
              class="hs-input"
              type="text"
              pInputText
              formControlName="username"
              placeholder="Ingrese su usuario"
              autocomplete="username"
              [class.hs-input--error]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
            />
          </div>
        </div>

        <div class="hs-field">
          <label class="hs-label" for="login-password">CONTRASEÑA</label>
          <p-password formControlName="password" [toggleMask]="true" inputStyleClass="hs-input" styleClass="w-full" placeholder="••••••••" />
        </div>

        <div class="login-form__options">
          <label class="login-form__remember">
            <p-checkbox formControlName="rememberMe" binary="true" /> Recordarme
          </label>
          <a (click)="forgotPassword()" class="login-form__forgot" style="cursor:pointer">¿Olvidó su clave?</a>
        </div>

        <button
          class="hs-btn hs-btn-secondary hs-btn-lg login-form__submit"
          type="submit"
          [disabled]="loginForm.invalid || loading">
          @if (!loading) {
            <span>INGRESAR</span>
          } @else {
            <span class="login-form__spinner">
              <span class="material-symbols-outlined" style="animation: spin 1s linear infinite">sync</span>
              Verificando...
            </span>
          }
          @if (!loading) {
            <span class="material-symbols-outlined">arrow_forward</span>
          }
        </button>
      </form>

      <footer class="login-card__footer">
        <span>© 2026 HOTEL SYSTEM MANAGEMENT</span>
        <div class="login-card__footer-icons">
          <span class="material-symbols-outlined" title="Soporte Técnico">support_agent</span>
          <span class="material-symbols-outlined" title="Red">lan</span>
          <span class="material-symbols-outlined" title="Seguridad">security</span>
        </div>
      </footer>
    </main>
  </div>
</div>
